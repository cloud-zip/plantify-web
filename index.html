<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#13140f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.json" />
    <title>Plantify</title>
    <!-- Google Fonts — preconnect for faster DNS + TLS handshake -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Only load the fonts we actually use (trimmed from 9 families to 4) -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@400;700&family=Grand+Hotel&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols — defer to not block render -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet" /></noscript>
    <style>
      :root {
        --bg-color: #12140e;
        --text-color: #e4e3da;
        --card-bg: rgba(28, 30, 20, 0.7);
        --border-color: rgba(255, 255, 255, 0.1);
        --accent-color: #d4ff00;
        
        --font-heading: 'Nunito', sans-serif;
        --font-body: 'Nunito', sans-serif;
        
        --size-heading: 1.875rem; /* 3xl text-3xl */
        --size-body: 0.875rem; /* text-sm default */
      }
      
      body {
        background-color: var(--bg-color) !important;
        color: var(--text-color) !important;
        font-family: var(--font-body), 'Nunito', sans-serif !important;
        transition: background-color 0.3s ease, color 0.3s ease;
        touch-action: pan-x pan-y;
      }
      
      /* Target header fonts explicitly */
      h1, h2, h3, h4, h5, h6, .font-serif, .serif-title {
        font-family: var(--font-heading), 'Nunito', sans-serif !important;
      }
      
      /* Handle dynamic body sizes */
      p, span:not(.material-symbols-outlined), div, li, select, textarea, input, label {
        font-size: var(--size-body);
      }
      
      /* Make speedometer, chart overlays and status dots respect custom fonts */
      * {
        font-family: inherit;
      }
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined' !important;
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      h1, h2, h3, h4, h5, h6, .serif-title, .font-serif {
        font-family: var(--font-heading), 'Nunito', sans-serif !important;
      }
      .mono-text, code, pre, .font-mono {
        font-family: 'JetBrains Mono', monospace !important;
      }
      
      ::-webkit-scrollbar {
        display: none;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
      }
      .glass-card {
        background: var(--card-bg) !important;
        border-color: var(--border-color) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
