<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#13140f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.json" />
    <title>Plantify</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts and Icons for Botanical Aesthetics -->
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Nunito:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700&family=Lora:ital,wght@0,400..700;1,400..700&family=Roboto:wght@300;400;500;700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "on-tertiary-fixed": "#191d16",
              "inverse-on-surface": "#30312b",
              "surface-container-high": "#292a25",
              "tertiary": "#ffffff",
              "on-secondary-container": "#b8b9b2",
              "background": "#13140f",
              "surface-container-highest": "#34352f",
              "error": "#ffb4ab",
              "tertiary-container": "#e1e4d8",
              "surface-bright": "#393a34",
              "surface-container-lowest": "#0d0f0a",
              "secondary-container": "#484a45",
              "primary-container": "#caf300",
              "surface-tint": "#b0d500",
              "tertiary-fixed-dim": "#c4c8bc",
              "on-tertiary": "#2e322a",
              "on-surface-variant": "#c5c9ac",
              "on-error-container": "#ffdad6",
              "outline": "#8f9378",
              "surface": "#13140f",
              "secondary-fixed": "#e3e3dc",
              "outline-variant": "#444932",
              "on-secondary-fixed-variant": "#464743",
              "on-secondary": "#2f312d",
              "surface-dim": "#13140f",
              "primary": "#ffffff",
              "on-primary-fixed-variant": "#3e4c00",
              "tertiary-fixed": "#e1e4d8",
              "on-tertiary-container": "#62665c",
              "secondary": "#c6c7c0",
              "surface-container-low": "#1b1c17",
              "surface-variant": "#34352f",
              "on-tertiary-fixed-variant": "#44483f",
              "on-background": "#e4e3da",
              "on-surface": "#e4e3da",
              "on-secondary-fixed": "#1a1c18",
              "inverse-surface": "#e4e3da",
              "secondary-fixed-dim": "#c6c7c0",
              "inverse-primary": "#536600",
              "surface-container": "#1f201b",
              "on-primary-fixed": "#171e00",
              "error-container": "#93000a",
              "primary-fixed": "#caf300",
              "on-primary-container": "#596c00",
              "on-primary": "#2a3400",
              "on-error": "#690005",
              "primary-fixed-dim": "#b0d500",
              'plant-dark': '#13140f',
              'plant-card': '#1c1e14',
              'plant-lime': '#d4ff00',
              'plant-yellow': '#e2f600',
            },
            "borderRadius": {
              "DEFAULT": "1rem",
              "lg": "2rem",
              "xl": "3rem",
              "full": "9999px"
            },
            "spacing": {
              "stack-gap": "1rem",
              "section-margin": "2rem",
              "container-padding": "1.5rem",
              "grid-gutter": "1rem"
            },
            "fontFamily": {
              "data-unit": ["JetBrains Mono"],
              "headline-md": ["Libre Caslon Text"],
              "data-lg": ["Libre Caslon Text"],
              "label-sm": ["JetBrains Mono"],
              "body-md": ["Inter"],
              "display-lg": ["Libre Caslon Text"],
              "serif": ['"Grand Hotel"', 'serif'],
              "sans": ['Nunito', 'sans-serif'],
              "mono": ['"JetBrains Mono"', 'monospace'],
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --bg-color: #12140e;
        --text-color: #e4e3da;
        --card-bg: rgba(28, 30, 20, 0.7);
        --border-color: rgba(255, 255, 255, 0.1);
        --accent-color: #d4ff00;
        
        --font-heading: 'Nunito', sans-serif;
        --font-body: 'Nunito', sans-serif;
        
        --size-heading: 1.875rem; /* 3xl text-3xl */
        --size-body: 0.875rem; /* text-sm default */
      }
      
      body {
        background-color: var(--bg-color) !important;
        color: var(--text-color) !important;
        font-family: var(--font-body), 'Nunito', sans-serif !important;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* Target header fonts explicitly */
      h1, h2, h3, h4, h5, h6, .font-serif, .serif-title {
        font-family: var(--font-heading), 'Nunito', sans-serif !important;
      }
      
      /* Handle dynamic body sizes */
      p, span, div, li, select, textarea, input, label {
        font-size: var(--size-body);
      }
      
      /* Make speedometer, chart overlays and status dots respect custom fonts */
      * {
        font-family: inherit;
      }
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined' !important;
      }
      h1, h2, h3, h4, h5, h6, .serif-title, .font-serif {
        font-family: var(--font-heading), 'Nunito', sans-serif !important;
      }
      .mono-text, code, pre, .font-mono {
        font-family: 'JetBrains Mono', monospace !important;
      }
      
      ::-webkit-scrollbar {
        display: none;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
      }
      .glass-card {
        background: var(--card-bg) !important;
        border-color: var(--border-color) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
